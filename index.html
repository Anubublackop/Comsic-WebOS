<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-OS Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div id="central-hub">
            <h2 class="hub-title">Neo-OS Command</h2>
            <div class="search-container">
                <input type="text" id="desktop-search" placeholder="Type a command...">
            </div>
            <div class="shortcuts-grid">
                <div class="desktop-icon" onclick="openApp('calculator')">🧮<span class="icon-text">Calc</span></div>
                <div class="desktop-icon" onclick="openApp('browser')">🌐<span class="icon-text">Web</span></div>
                <div class="desktop-icon" onclick="openApp('doodle')">🎨<span class="icon-text">Doodle</span></div>
            </div>
        </div>

        <div id="calculator-window" class="window" style="left: 50px; top: 50px;">
            <div class="window-header">
                <span class="window-title">🧮 Calculator</span>
                <div class="win-controls">
                    <button class="win-btn close-btn" onclick="closeApp('calculator')">X</button>
                </div>
            </div>
            <div class="window-body">
                <input type="text" id="calc-display" disabled value="0">
                <div class="calc-buttons">
                    <button class="c-btn" onclick="calcPress('7')">7</button>
                    <button class="c-btn" onclick="calcPress('8')">8</button>
                    <button class="c-btn" onclick="calcPress('9')">9</button>
                    <button class="c-btn action" onclick="calcPress('/')">/</button>
                    <button class="c-btn" onclick="calcPress('4')">4</button>
                    <button class="c-btn" onclick="calcPress('5')">5</button>
                    <button class="c-btn" onclick="calcPress('6')">6</button>
                    <button class="c-btn action" onclick="calcPress('*')">*</button>
                    <button class="c-btn" onclick="calcPress('1')">1</button>
                    <button class="c-btn" onclick="calcPress('2')">2</button>
                    <button class="c-btn" onclick="calcPress('3')">3</button>
                    <button class="c-btn action" onclick="calcPress('-')">-</button>
                    <button class="c-btn clear" onclick="calcClear()">C</button>
                    <button class="c-btn" onclick="calcPress('0')">0</button>
                    <button class="c-btn action" onclick="calcEval()">=</button>
                    <button class="c-btn action" onclick="calcPress('+')">+</button>
                </div>
            </div>
        </div>

        <div id="doodle-window" class="window" style="left: 150px; top: 100px; width: 450px;">
            <div class="window-header" style="background-color: #ff90e8;">
                <span class="window-title">🎨 Doodle Pad</span>
                <div class="win-controls">
                    <button class="win-btn close-btn" onclick="closeApp('doodle')">X</button>
                </div>
            </div>
            <div class="window-body">
                <button class="c-btn clear" onclick="clearCanvas()" style="margin-bottom: 10px;">Clear Canvas</button>
                <canvas id="doodle-canvas" width="400" height="250" style="border: 2px solid black; background: white; cursor: crosshair;"></canvas>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-trigger" onclick="toggleStart()">START</button>
        <div id="running-tasks"></div>
    </div>

    <div id="start-menu">
        <div class="menu-link" onclick="openApp('calculator')">🧮 Calculator</div>
        <div class="menu-link" onclick="openApp('doodle')">🎨 Doodle Pad</div>
        <div class="menu-link jiggle-btn" onclick="triggerJiggle()">🌀 Jiggle Mode!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
